    <div class="modal fade" id="writeModal" tabindex="-1">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <!-- Header -->
          <div class="modal-header border-0 px-4 pt-4">
            <h5 class="modal-title fw-semibold">Write your story</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body px-4 pb-2">
            <input
              type="text"
              id="postTitle"
              class="form-control border-0 fw-bold mb-3"
              placeholder="Title..."
              style="font-size: 28px; box-shadow: none"
            />

            <textarea
              id="postContent"
              class="form-control border-0"
              rows="10"
              placeholder="Tell your story..."
              style="
                font-size: 18px;
                line-height: 1.8;
                box-shadow: none;
                resize: none;
              "
            ></textarea>
          </div>

          <div
            class="modal-footer border-0 px-4 pb-4 d-flex justify-content-between"
          >
            <small class="text-muted">Press Publish when you're ready</small>

            <div>
              <button class="btn btn-light me-2" data-bs-dismiss="modal">
                Cancel
              </button>
              <button id="publishPost" class="btn btn-dark px-4 rounded-pill">
                Publish
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
