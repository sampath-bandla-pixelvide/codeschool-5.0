<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Medium</title>


    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />

    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f7f4ed;
      }

      .navbar {
        border-bottom: 1px solid #000;
        margin-bottom: 10px;
        background-color: #f7f4ed;
      }

      .hero {
        min-height: calc(100vh - 60px);
        border-bottom: 1px solid #000;
      }

      .hero-title {
        font-family: Georgia, serif;
        font-size: 3rem;
        line-height: 1.05;
        font-weight: 500;
      }

      .hero-sub {
        font-size: 1rem;
        max-width: 300px;
      }

      /*Desktop scaling */
      @media (min-width: 768px) {
        .hero-title {
          font-size: 6rem;
        }

        .hero-sub {
          font-size: 1.5rem;
          max-width: 500px;
        }
      }

      .hero-img-absolute {
        position: absolute;
        right: 0;
        top: 60%;
        transform: translateY(-50%);
        max-height: 600px;
      }

      .btn-black {
        background: black;
        color: white;
        border-radius: 30px;
        padding: 10px 25px;
      }
    </style>
  </head>
  <body>

      <div class="d-none d-md-flex gap-3 align-items-center">
        <a href="#" class="me-3 text-dark text-decoration-none">Our story</a>
        <a href="#" class="me-3 text-dark text-decoration-none">Membership</a>
        <a href="#" class="me-3 text-dark text-decoration-none">Write</a>

  
        <button
          class="btn me-2"
          data-bs-toggle="modal"
          data-bs-target="#loginModal"
        >
          Sign in
        </button>

        <button class="btn btn-black btn-sm">Get started</button>
      </div>
      <div class="d-flex d-md-none align-items-center justify-content-between">
        <button class="btn btn-dark rounded-pill px-3">Get started</button>
      </div>
    </nav>

 
    <div class="hero d-flex align-items-center">
      <div class="container px-3">
        <div class="hero-text">
          <h1 class="hero-title">Human<br />stories & ideas</h1>

          <p class="hero-sub mt-3">
            A place to read, write, and deepen your understanding
          </p>
          <button class="btn btn-black btn-lg mt-2">Start reading</button>
        </div>
      </div>
      <img
        src="https://miro.medium.com/v2/format:webp/4*SdjkdS98aKH76I8eD0_qjw.png"
        class="hero-img-absolute d-none d-md-block"
        alt=""
      />
    </div>

   
    <div class="modal fade" id="loginModal">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content p-4 position-relative">
         
          <button
            type="button"
            class="btn-close position-absolute top-0 end-0 m-3"
            data-bs-dismiss="modal"
          ></button>

          <h4 class="text-center mb-3">Sign in</h4>

          <input
            type="text"
            id="name"
            class="form-control mb-3"
            placeholder="Enter your Name"
          />

          <input
            type="email"
            id="email"
            class="form-control mb-3"
            placeholder="Enter email"
          />

          <input
            type="text"
            id="loginOtp"
            class="form-control mb-3 d-none"
            placeholder="Enter OTP"
          />

      
          <button class="btn btn-dark w-100 mb-2" id="sendOtpBtn">
            Send OTP
          </button>

          <button class="btn btn-success w-100 d-none" id="loginverifyBtn">
            Verify & Login
          </button>
        </div>
      </div>
    </div>

    <div class="modal fade" id="otpModal">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content p-4 text-center">
          <button
            class="btn-close position-absolute top-0 end-0 m-3"
            data-bs-dismiss="modal"
          ></button>

          <h4 class="mb-3">Enter OTP</h4>

          <input
            type="text"
            id="otpInput"
            class="form-control mb-3"
            placeholder="4-digit OTP"
          />

          <p id="timer" class="text-muted">Expires in 120s</p>

          <button class="btn btn-success w-100" id="verifyOtpBtn">
            Verify
          </button>
        </div>
      </div>
    </div>

    <div
      class="d-flex align-items-center justify-content-center gap-4"
      style="margin: 40px"
    >
      <span class="text-muted">Help</span>
      <span class="text-muted">Status</span>
      <span class="text-muted">About</span>
      <span class="text-muted">Careers</span>
      <span class="text-muted">Press</span>
      <span class="text-muted">Blog</span>
      <span class="text-muted">privacy</span>
      <span class="text-muted">Rules</span>
      <span class="text-muted">Terms</span>
      <span class="text-muted">Text to Speech</span>
    </div>
