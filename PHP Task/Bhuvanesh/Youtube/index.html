    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <style>
      
      #side-card_display {
        max-height: 90vh;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: #8c8c8c #000000;
      }
      .card-cursor {
        cursor: pointer;
      }
      #comment::placeholder {
        color: white;
      }
      .fixed-margin {
  margin-left: 55px !important;
}
.mainCard-width{
  max-width: 380px !important;
}
.toggle-width{
  max-width : 500px !important
}
.dropDown li:hover{
  background-color: #212121 !important;
}

      <div class="header fixed-top"></div>
      <div class="row ">
        <div class="col-auto sidebar"></div>
        <div class="col">
          <div
            class="mainContent d-flex align-items-center justify-content-center offset-2 flex-wrap"

                  Try searching to get started
                </h5>
                <p class="card-text" style="color: #a6a6a6">

                </p>
              </div>
            </div>
          </div>
        </div>
      </div>

    ></script>
    <script src="./scripts/loader.js"></script>
    <script src="./scripts/index.js"></script>
    <script src="./scripts/youtube.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
