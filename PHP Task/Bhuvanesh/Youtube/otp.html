<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
  </head>
  <body class="vh-100 w-100 bg-dark">
    <div class="container-fluid">
      <div class="row pt-5 vh-100 w-100 d-flex justify-content-lg-center">
        <div class="col-lg-10 d-flex flex-column p-5">
          <div class="card bg-black text-white p-5 rounded-5 shadow-lg bg-black">
            <div class="row">
              <div class="col-md-6 mb-4 mb-md-0 pb-5">
                <svg xmlns="https://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 40 48" aria-hidden="true" jsname="jjf7Ff"><path fill="#4285F4" d="M39.2 24.45c0-1.55-.16-3.04-.43-4.45H20v8h10.73c-.45 2.53-1.86 4.68-4 6.11v5.05h6.5c3.78-3.48 5.97-8.62 5.97-14.71z"></path><path fill="#34A853" d="M20 44c5.4 0 9.92-1.79 13.24-4.84l-6.5-5.05C24.95 35.3 22.67 36 20 36c-5.19 0-9.59-3.51-11.15-8.23h-6.7v5.2C5.43 39.51 12.18 44 20 44z"></path><path fill="#FABB05" d="M8.85 27.77c-.4-1.19-.62-2.46-.62-3.77s.22-2.58.62-3.77v-5.2h-6.7C.78 17.73 0 20.77 0 24s.78 6.27 2.14 8.97l6.71-5.2z"></path><path fill="#E94235" d="M20 12c2.93 0 5.55 1.01 7.62 2.98l5.76-5.76C29.92 5.98 25.39 4 20 4 12.18 4 5.43 8.49 2.14 15.03l6.7 5.2C10.41 15.51 14.81 12 20 12z"></path></svg>
                <h1 class="fw-normal ">Sign in</h1>
                <p class="text-secondary">
                  Otp to signIn to youtube
                </p>
              </div>
              <div class="col-md-6 pt-5 pb-5">
                <form class="pt-2" id="otpForm">
                  <div class="form-floating mb-3">
                    <input
                      type="password"
                      class="form-control bg-black text-white border-secondary"
                      placeholder="otp"
                      id="otp"
                    required/>
                    <label for="otp" class="text-white" >OTP</label>
                  </div>

                  <p class="text-danger small" id="timer">
                    
                  </p>
                  <div class="d-flex justify-content-end align-items-center">
                    <button  type="button" class="btn rounded-pill text-white px-4 me-4" id="getOtp">Get otp</button>
                    <button type="button" class="btn btn-primary rounded-pill px-4" id="verify">
                        verify
                      </button>
                  </div>
                </form>
              </div>
            </div>
          </div>
          <div class="row mt-3 text-white small">
            <div class="col-6 text-start">English (United Kingdom)</div>
            <div class="col-6 text-end">
              <a href="#" class="text-white text-decoration-none me-3">Help</a>
              <a href="#" class="text-white text-decoration-none me-3">Privacy</a>
              <a href="#" class="text-white text-decoration-none">Terms</a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://code.jquery.com/jquery-4.0.0.js"
      integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./scripts/otp.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
