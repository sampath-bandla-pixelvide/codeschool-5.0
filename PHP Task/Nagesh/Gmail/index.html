<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Gmail Sign In</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/login.css" />
  </head>
  <body>
    <div class="top-bar">
      <img src="/styles/googlelogo.png" alt="Google" />
    </div>

    <div class="page-center">
      <div class="card">
        <div class="card-logo">
          <img src="/styles/googlelogo.png" alt="Google" />
        </div>
        <h1>Sign in</h1>
        <p class="subtitle" id="subtitle">Use your Google Account</p>

        <div id="emailStep">
          <div class="input-wrap">
            <label for="email">Email or phone</label>
            <input type="text" id="email" autocomplete="email" autofocus />
          </div>
          <div class="error-msg" id="emailError"></div>
          <!-- <a href="#" class="forgot-link">Forgot email?</a> -->
          <div class="actions">
            <a href="register.html" class="create-link">Create account</a>
            <button class="btn-next" id="nextBtn" onclick="nextStep()">
              Next
            </button>
          </div>
        </div>

        <div id="passwordStep" class="hidden">
          <div class="input-wrap" style="position: relative">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              autocomplete="current-password"
            />
            <button
              class="show-pw"
              onclick="togglePw()"
              id="togglePwBtn"
              title="Show password"
            >
              👁
            </button>
          </div>
          <div class="error-msg" id="passwordError"></div>
          <a href="#" class="forgot-link" onclick="openModal()"
            >Forgot password?</a
          >
          <div class="actions">
            <a href="#" class="create-link" onclick="backStep()">Back</a>
            <button class="btn-next" id="loginBtn" onclick="login()">
              Next
            </button>
          </div>
        </div>
      </div>
    </div>

    <footer>
      <span>English (United States)</span>
      <a href="#">Help</a>
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
    </footer>
    <div
      id="forgotModal"
      class="modal d-flex align-items-center justify-content-center bg-dark bg-opacity-50 hidden"
    >
      <div
        class="modal-content p-4 rounded-4 shadow border-0"
        style="width: 380px"
      >
        <h4 class="text-center fw-bold mb-3 text-dark">Reset Password</h4>
        <p class="text-center text-muted small mb-4">
          Enter your email to receive a verification code
        </p>

        <div id="fpEmailStep" class="mb-3">
          <input
            type="email"
            id="fpEmail"
            class="form-control form-control-lg mb-3"
            placeholder="Enter your email"
          />

          <button
            type="button"
            class="btn btn-primary w-100"
            onclick="sendOtp()"
          >
            Send OTP
          </button>
        </div>

        <div id="fpOtpStep" class="hidden mb-3">
          <input
            type="text"
            id="fpOtp"
            class="form-control form-control-lg text-center fw-bold mb-3"
            placeholder="Enter OTP"
            maxlength="6"
          />

          <button
            type="button"
            class="btn btn-success w-100"
            onclick="verifyOtp()"
          >
            Verify OTP
          </button>
        </div>

        <div id="fpResetStep" class="hidden mb-3">
          <input
            type="password"
            id="newPassword"
            class="form-control form-control-lg mb-3"
            placeholder="New Password"
          />

          <button
            type="button"
            class="btn btn-dark w-100"
            onclick="resetPassword()"
          >
            Reset Password
          </button>
        </div>

        <p id="fpMsg" class="text-danger text-center small mb-2"></p>

        <button class="btn btn-light w-100" onclick="closeModal()">
          Close
        </button>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="script/login.js"></script>
  </body>
</html>
