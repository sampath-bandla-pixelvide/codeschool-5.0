                Payments
              </li>
              <li class="menu-item">
                <span class="menu-icon icon-pages"></span>Pages
              </li>
              <li class="menu-item">
                <span class="menu-icon icon-play-games"></span>Play Games
              </li>
              <li class="menu-item">
                <span class="menu-icon icon-recent-ad-activity"></span>Recent Ad
                Activity
              </li>
            </ul>
          </div>
        </div>
        <div class="col-12 col-md-6">
          <div id="mainFeed"></div>
        </div>

        <div id="postModal" class="modal-overlay d-none">
          <div class="modal-box">
            <div class="modal-header">
              <h5>Create post</h5>
              <span id="closeModal">&times;</span>
            </div>
            <div class="modal-body">
              <textarea
                id="modalText"
                placeholder="What's on your mind?"
              ></textarea>
              <div id="previewContainer"></div>
              <div id="postsWrapper">
                <div id="postsContainer"></div>
              </div>
            </div>
            <button id="submitPost" class="btn btn-primary w-100">Post</button>
          </div>
        </div>
        <div class="modal fade" id="commentModal" tabindex="-1">
          <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title">Comments</h5>
                <button
                  type="button"
                  class="btn-close"
                  data-bs-dismiss="modal"
                ></button>
              </div>
              <div class="modal-body">
                <div id="modalCommentsList"></div>
              </div>
              <div class="modal-footer">
                <input
                  type="text"
                  id="modalCommentInput"
                  class="form-control"
                  placeholder="Write comment"
                />
                <button id="postCommentBtn" class="btn btn-primary">
                  Post
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="scripts/dashboard.js"></script>
  </body>
