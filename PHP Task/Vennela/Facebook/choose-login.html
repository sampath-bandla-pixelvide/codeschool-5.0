<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Choose Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <style>
      .card-box {
        border: 1px solid #ddd;
        border-radius: 12px;
        padding: 15px;
      }

      .option-box {
        border: 1px solid #ddd;
        border-radius: 12px;
        overflow: hidden;
      }

      .option-item {
        padding: 12px 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #eee;
      }

      .option-item:last-child {
        border-bottom: none;
      }

      .continue-btn {
        background: #1877f2;
        color: white;
        border-radius: 25px;
        height: 45px;
        border: none;
      }
      .continue-btn:hover {
        color: white;
        background: #1877f2;
      }
      .secondary-btn {
        border-radius: 25px;
        height: 45px;
      }
    </style>
  </head>
  <body>
    <div class="container d-flex justify-content-center mt-5">
      <div style="max-width: 600px; width: 100%">
        <a href="findAccount.html" class="text-dark text-decoration-none fs-4">
          <i class="bi bi-chevron-left"></i>
        </a>
        <h4 class="text-center mb-4">Choose a way to log in</h4>
        <!-- <div class="card-box mb-3 d-flex align-items-center">
          <div class="me-3">
            <img src="" class="rounded-circle" />
          </div>
          <div>
            <div class="fw-bold">Eatukuri Vennela</div>
            <small class="text-muted">Facebook</small>
          </div>
        </div> -->
        <div class="option-box mb-3">
          <div class="option-item">
            <div>
              <div>Get code via SMS</div>
              <small class="text-muted">+91XXXXXXXXXX</small>
            </div>
            <input type="radio" name="login" value="otp" id="otpOption" checked />
          </div>
          <div class="option-item">
            <div>
              <div>Continue with password</div>
              <small class="text-muted">Use your password</small>
            </div>
            <input type="radio" name="login" value="password" id="passOption"/>
          </div>
        </div>
        <p class="text-center text-primary small">
          No longer have access to these?
        </p>
        <button onclick="goToOTP()" class="btn continue-btn w-100 mb-2">
          Continue
        </button>
        <button class="btn btn-light w-100 secondary-btn">Not you?</button>
      </div>
    </div>
    <script>
function goToOTP() {
  let selected = document.querySelector('input[name="login"]:checked').value;
  if (selected === "otp") {
    window.location.href = "otp.html";
  } 
  else if (selected === "password") {
    window.location.href = "index.html";
  }

}

    </script>
  </body>
</html>
