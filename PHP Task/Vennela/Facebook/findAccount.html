<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find Your Account</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <style>
      .form-control {
        border-width: 1.5px;
        border-radius: 16px;
      }
      .form-control:focus {
        border-color: black;
        box-shadow: none;
      }
      .continue {
        background: #0868e6;
        color: white;
        border-radius: 30px;
        height: 45px;
        font-size: 18px;
        border: none;
      }
      .continue:hover {
        background: #0868e6;
      }
    </style>
  </head>
  <body>
    <div class="container d-flex flex-column min-vh-100">
      <div class="flex-grow-1 d-flex justify-content-center align-items-start">
        <div class="w-100" style="max-width: 600px; margin-top: 20px">
          <a
            href="./index.html"
            class="fs-4 mb-5 mt-0 text-decoration-none text-dark"
            ><i class="bi bi-chevron-left"></i
          ></a>
          <p class="fs-4 fw-medium mb-0 mt-3">Find Your Account</p>
          <span>Enter your mobile number or email address.</span>
          <div class="form-floating mb-2 mt-3">
            <input
              type="text"
              id="contact"
              class="form-control"
              placeholder="Email"
              required
            />
            <label>Mobile number or Email address</label>
          </div>
          <div id="errorMsg" class="text-danger small mt-2"></div>
          <button
            onclick="goNext()"
            class="btn continue w-100 pt-2 pb-3 fs-6 mt-3"
          >
            Continue
          </button>
        </div>
      </div>
    </div>
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
      function goNext() {
        let contact = $("#contact").val().trim();
        $("#errorMsg").text("");

        if (!contact) {
          $("#errorMsg").text("Please enter email or mobile");
          return;
        }

        $.ajax({
          url: "api/findAccount.php",
          type: "POST",
          data: { contact: contact },
          success: function (res) {
            console.log("Generated OTP:", res);
            if (res === "not_found") {
              $("#errorMsg").text("No account found");
            } else {
              console.log("OTP:", res);
              localStorage.setItem("generatedOtp", res);
              localStorage.setItem("resetContact", contact);
              window.location.href = "choose-login.html";
            }
          },
        });
      }
    </script>
  
  </body>
</html>
