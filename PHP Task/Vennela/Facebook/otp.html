<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Confirm Account</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
   <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  <style>
    .form-control {
      border-radius: 14px;
      height: 55px;
      font-size: 18px;
    }
    .form-control:focus {
      border-color: black;
      box-shadow: none;
    }

    .continue-btn {
      background: #1877f2;
      color: white;
      border-radius: 25px;
      height: 45px;
      border: none;
    }

    .secondary-btn {
      border-radius: 25px;
      height: 45px;
    }
  </style>
</head>
<body>
<div class="container d-flex justify-content-center mt-5">
  <div style="max-width:600px;width:100%;">
    <a href="choose-login.html" class="text-dark text-decoration-none fs-4">
      <i class="bi bi-chevron-left"></i
          >
    </a>
    <h4 class="mt-3">Confirm your account</h4>
    <p class="text-muted">
      We sent a code via SMS. Enter that code to confirm your account.
    </p>
    <input
      type="text"
      id="otp"
      class="form-control mb-4"
      placeholder="Enter code"
    />
    <div id="otpError" class="text-danger small"></div>
    <button onclick="verifyOTP()" class="btn continue-btn w-100 mb-3">
      Continue
    </button>
    <button class="btn btn-light w-100 secondary-btn">
      Didn't get a code?
    </button>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>
function verifyOTP() {
  let otp = $("#otp").val().trim();
  let contact = localStorage.getItem("resetContact");
  $("#otpError").text(""); 
  if (!otp) {
    $("#otpError").text("Please enter the code");
    return;
  }
  $.ajax({
    url: "api/verificationotp.php",
    type: "POST",
    data: {
      contact: contact,
      otp: otp
    },
    success: function (res) {
      console.log("Server:", res);
      if (res === "no_otp") {
        $("#otpError").text("No OTP generated. Try again.");
      } 
      else if (res === "invalid_otp") {
        $("#otpError").text("Invalid code");   
      } 
      else if (res === "expired") {
        $("#otpError").text("OTP expired");
      } 
      else if (res === "success") {
        window.location.href = "dashboard.html";
      } 
      else {
        $("#otpError").text("Something went wrong");
      }
    }
  });
}
window.onload = function () {
  let otp = localStorage.getItem("generatedOtp");
  console.log("Stored OTP:", otp);
};
</script>
</body>
</html>
