<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <title>Login Page</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS v5.3.8 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      @media (max-width: 320px) {
        #loginForm {
          font-size: small;
          padding:2px;
        }
        .footer-text{
          display: flex;
          flex-direction: column;
          justify-content:start;
        }
      }

      @media (min-width:768px) {
        #codeBtn {
          font-size: small;
        }
        .footer-text{
          display: flex;
          flex-direction:row;
          justify-content:center;
          gap:10px;
        }
      }

      .main-container {
        background-image: url("./assets/login_bg.png") !important;
        background-color: rgba(0, 0, 0, 0.418);
        background-blend-mode: overlay;
        min-height: 89vh;
        background-position: center;
        overflow-y: auto;
        scrollbar-width: none;
        background-repeat: none;
      }
      header {
        position: sticky;
        top: 0;
      }
      ul {
        list-style-type: none;
      }
      li {
        text-decoration: underline;
        font-size: medium;
      }
      .footer-text {
        color: rgba(211, 208, 208, 0.734);
      }
    </style>
  </head>

  <body class="bg-dark">
    <header
      style="background-color: rgba(0, 0, 0, 0.977); padding: 20px"
      class="d-flex justify-content-between z-3"
    >
      <img
        src="https://images.ctfassets.net/y2ske730sjqp/821Wg4N9hJD8vs5FBcCGg/9eaf66123397cc61be14e40174123c40/Vector__3_.svg?w=460"
        alt="logo"
        style="background-color: rgba(0, 0, 0, 0.317)"
        class="ms-4 col-3 col-md-1"
      />
      <div class="d-flex col-5 justify-content-end gap-3">
        <select
          name="Language"
          class="btn bg-white bg-opacity-25 text-white bg-secondary d-none d-md-flex"
        >
          <option value="english" selected class="bg-dark text-white">
            English
          </option>
          <option value="hindi" class="bg-dark text-white">Hindi</option>
        </select>
        <button class="btn btn-danger text-white fw-bolder" id="signUpBtn">
          Sign Up
        </button>
      </div>
    </header>

    <main
      class="main-container d-flex justify-content-center align-items-center p-lg-none p-5"
    >
      <div
        class="d-flex flex-column border rounded-2 border-0"
        style="
          background-color: rgba(0, 0, 0, 0.726);
          padding: 40px;
          min-width: 30%;
        "
        id="loginDiv"
      >
        <h2 class="text-white fw-bold mb-3">Sign In</h2>
        <form class="m-2 mb-1">
          <div class="form-floating mb-2">
            <input
              type="email"
              class="form-control bg-dark bg-opacity-25 border border-white text-white"
              id="floatingInput"
              placeholder="name@example.com"
              required
            />
            <label for="floatingInput" class="text-white">Email address</label>
          </div>
          <small id="emailErrMsg" class="text-danger mb-3"></small>
          <button
            class="btn btn-danger w-100 fw-bold mb-1"
            id="loginForm"
            type="button"
          >
            Send Sign-in Code
          </button>
          <h6 class="text-center text-white">OR</h6>
        </form>
        <button
          class="btn bg-secondary text-white bg-opacity-25 fw-bold w-100 mb-2"
          id="passwordBtn"
        >
          Use Password
        </button>
        <p class="text-secondary">
          New to Netflix?
          <a href="./register.html" class="text-white fw-bold"> Sign up now.</a>
        </p>
      </div>

      <div
        class="d-flex flex-column border rounded-2 border-0 d-none"
        style="
          background-color: rgba(0, 0, 0, 0.726);
          padding: 40px;
          min-width: 30%;
        "
        id="otpDiv"
      >
        <h2 class="text-white fw-bold mb-3">Sign In</h2>
        <form class="m-2 mb-1">
          <div class="form-floating mb-2">
            <input
              type="email"
              class="form-control bg-dark bg-opacity-25 border border-white text-white"
              id="floatingEmail"
              placeholder="name@example.com"
              required
              disabled
            />
            <label for="floatingEmail" class="text-white">Email address</label>
          </div>
          <div class="form-floating mb-2">
            <input
              type="text"
              class="form-control bg-dark bg-opacity-25 border border-white text-white"
              id="floatingOtp"
              placeholder="name@example.com"
              required
              maxlength="6"
            />
            <label for="floatingOtp" class="text-white">Otp</label>
          </div>
          <button
            class="btn btn-danger w-100 fw-bold mb-1"
            type="button"
            id="verifyOtp"
          >
            Verify Otp
          </button>
        </form>
        <button
          class="btn bg-secondary text-white bg-opacity-25 fw-bold w-100 mb-2"
          id="passwordBtnNew"
        >
          Use Password
        </button>
        <p class="text-secondary">
          New to Netflix?
          <a href="./register.html" class="text-white fw-bold"> Sign up now.</a>
        </p>
      </div>

    </main>
    <footer
      class="bg-dark d-flex flex-column p-2"
    >
      <p class="footer-text text-center">Questions? Call 000-800-919-1743 (Toll-Free)</p>
      <ul
        class="footer-text overflow-x-auto"
      >
        <li class="list-item">FAQ</li>
        <li class="list-item">Help Center</li>
        <li class="list-item">Terms of use</li>
        <li class="list-item">Privacy</li>
        <li class="list-item">Cookie Preferences</li>
        <li class="list-item">Corporate Information</li>
      </ul>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./scripts/codeSignIn.js"></script>
  </body>
</html>
