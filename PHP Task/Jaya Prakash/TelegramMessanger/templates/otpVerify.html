<div
  class="card shadow-sm border-0 rounded-4 p-4 text-center"
  style="max-width: 400px; width: 100%"
>
  <div class="mb-3">
    <i class="bi bi-shield-lock fs-1 text-primary"></i>
  </div>

  <h4 class="fw-semibold">Verify OTP</h4>
  <p class="text-muted small mb-3">Enter the 6-digit code sent to your phone</p>

  <form id="otpForm">
    <div class="d-flex justify-content-between gap-2 mb-3">
      <input
        type="text"
        id="otpInput"
        class="form-control text-center"
        placeholder="XXX-XXX"
        maxlength="6"
      />
    </div>

    <div id="otpError" class="text-danger small mb-2 d-none">
      Invalid or expired OTP
    </div>

    <button
      class="btn btn-primary w-100 rounded-pill disabled"
      id="otpSubmitBtn"
      type="submit"
    >
      Verify
    </button>
  </form>

  <div class="mt-3">
    <small class="text-muted">
      Didn’t receive code?
      <a href="#" id="resendOtp" class="text-decoration-none">Resend</a>
    </small>
    <div id="timer" class="text-secondary small mt-1"></div>
  </div>
</div>
