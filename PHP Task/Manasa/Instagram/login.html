<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background: #fafafa;
      }
      .container-main {
        height: 100vh;
      }
      .left-section {
        padding: 60px;
      }
      .main-text {
        text-align: center;
        font-weight: 400;
        margin-top: 20px;
      }

      .gradient-text {
        background: linear-gradient(45deg, #f58529, #dd2a7b, #8134af);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        display: inline-block;
      }

      .form-control {
        background: #f5f6f7;
        border: 1px solid #ccc;
        border-radius: 12px;
        padding: 14px;
      }

      .form-control:focus {
        border-color: #1877f2;
        box-shadow: 0 0 0 2px rgba(24, 119, 242, 0.2);
        background: #fff;
      }

      .form-floating label {
        color: #777;
        font-size: 14px;
      }
      .right-section {
        border-left: 1px solid #ddd;
      }
    </style>
  </head>
  <body>
    <div class="container-fluid container-main d-flex">
      <div class="col-md-6 left-section d-none d-md-block">
        <img
          src="./Images/instagram_logo.jpg"
          alt=""
          style="height: 100px; width: 100px"
        />
        <h2 class="main-text">
          See everyday moments from your
          <span class="gradient-text">close friends.</span>
        </h2>
        <img
          src="./Images/insta_bg.webp"
          style="height: 400px; width: 500px"
          alt=""
        />
      </div>

      <div class="col-md-6 d-flex align-items-center p-5 right-section">
        <div class="login-box w-100">
          <h5 class="mb-4">Log into Instagram</h5>
          <form id="loginForm">
            <div class="form-floating mb-3">
              <input
                type="text"
                class="form-control"
                id="loginInput"
                placeholder=" "
              />
              <label>Mobile number, username or email</label>
            </div>
            <div id="loginError" class="text-danger small mb-2"></div>

            <div class="form-floating mb-3">
              <input
                type="password"
                class="form-control"
                id="password"
                placeholder=" "
              />
              <label>Password</label>
            </div>
            <div id="passwordError" class="text-danger small mb-2"></div>
            <button
              type="submit"
              id="loginBtn"
              class="btn p-2 btn-login bg-primary w-100 mb-3 text-white fw-4 rounded-4"
              disabled
            >
              Log in
            </button>
          </form>
          <div class="text-center mb-5">
            <a
              href="index.html"
              style="text-decoration: none"
              class="text-black"
              >Forgot password?</a
            >
          </div>

          <button class="btn btn-outline-secondary w-100 mb-3 rounded-4 p-2">
            <i class="bi bi-facebook text-primary"></i> Log in with Facebook
          </button>

          <button
            onclick="window.location.href = 'signup.html'"
            class="btn btn-outline-primary w-100 mb-2 rounded-4 p-2"
          >
            Create new account
          </button>
          <div class="text-center mt-2">
            <img
              src="./Images/meta_logo.png"
              style="height: 50px; width: 100px"
              alt=""
            />
          </div>
        </div>
      </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="./Scripts/login.js"></script>
  </body>
</html>
