<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <style>
    body {
      background: #f0f2f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    }

    .container-box {
      max-width: 600px;
      margin: 60px auto;
    }

    .form-control {
      height: 56px;
      padding: 16px 12px;
    }

    .form-floating label {
      color: #777;
      font-size: 14px;
    }

    .input-error {
      border: 1px solid #ed4956 !important;
    }

    .label-error {
      color: #ed4956 !important;
    }

    .input-error::placeholder {
      color: #ed4956;
    }

    .btn-main {
      background: #1877f2;
      color: white;
      border-radius: 30px;
      padding: 14px;
      border: none;
    }

    .btn-main:hover {
      background: #166fe0;
    }

    .btn-secondary-custom {
      background: white;
      border: 1px solid #ccc;
      border-radius: 30px;
      padding: 14px;
    }

    .btn-secondary-custom:hover {
      background: #e6f4ea;
      border-color: #34a853;
    }

    .link {
      color: #1877f2;
      text-decoration: none;
    }

    .footer {
      font-size: 13px;
      word-spacing: 8px;
    }
  </style>
  <body>
    <div class="container-box">
      <i class="bi bi-chevron-left back" onclick="goToSignup()"></i>
      <h2 class="fw-semibold">Enter the confirmation code</h2>
      <p class="mt-2">
        To conform your account , enter the 6 -digit code we sent
      </p>
      <div class="form-floating mt-3">
        <input
          type="text"
          id="codeInput"
          class="form-control rounded-4"
          placeholder="Confirmation code"
        />
        <label id="codeLabel">Confirmation code</label>
      </div>

      <div id="errorText" class="text-danger small mt-1"></div>
      <button onclick="validate()" class="btn btn-main w-100 mt-4">
        Continue
      </button>
      <button class="btn btn-secondary-custom w-100 mt-3">
        I didn't get the code
      </button>
      <button
        type="button"
        class="btn btn-outline-custom w-100 mt-2 text-primary"
        onclick="window.location.href = 'index.html'"
      >
        I already have an account
      </button>
    </div>
    <div class="footer text-center text-secondary mt-3">
      <div>
        Meta About Blog Jobs Help API Privacy Terms Locations Instagram Lite
      </div>
      <div class="mt-1">English © 2026 Instagram from Meta</div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="./Scripts/registerConfirm.js"></script>
  </body>
</html>
