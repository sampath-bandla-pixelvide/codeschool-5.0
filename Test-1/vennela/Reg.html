<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RegisterForm</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
   <link rel="stylesheet" href="Reg.css">
  </head>
  <body>

<div class="form-container shadow">

  <h3 class="mb-4">Welcome.!</h3>

  <form id="registerForm">

    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" id="username" class="form-control" placeholder="username" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" id="email" class="form-control" placeholder="user@example.com" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Phone Number</label>
      <input type="text" id="phone" class="form-control" placeholder="+91 987654321" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Password</label>
      <div class="input-group">
        <input type="password" id="password" class="form-control" required>
        
      </div>
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">Date of Birth</label>
        <input type="date" id="dob" class="form-control">
      </div>

      <div class="col-md-6 mb-3">
        <label class="form-label">Age</label>
        <input type="number" id="age" class="form-control" placeholder="25">
      </div>
    </div>

    <button type="submit" class="btn btn-dark w-100">
  Sign-Up
    </button>

  </form>

  <div id="result" class="mt-3 fw-bold"></div>

</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="Reg.js"></script>
  </body>
</html>
