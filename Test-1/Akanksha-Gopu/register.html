<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />

    <title>Document</title>
  </head>
  <body>
    <div
      class="card rounded-4 shadow d-flex justify-content-center m-5 p-5 w-50 m-auto mt-5"
    >
      <h3 class="mb-4 text-center">Register</h3>
      <div class="mb-3">
        <label for="user" class="form-label">User Name</label>
        <input
          type="text"
          class="form-control"
          id="user"
          placeholder="Enter your name"
          required
        />
        <div id="usermsg" class="text-danger mt-2"></div>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email address</label>
        <input
          type="email"
          class="form-control"
          id="email"
          placeholder="name@example.com"
          required
        />
        <div id="emailmsg" class="text-danger mt-2"></div>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input
          type="password"
          class="form-control"
          id="password"
          placeholder=""
          required
        />
        <div id="passmsg" class="text-danger mt-2"></div>
      </div>
      <div class="mb-3">
        <label for="dob" class="form-label">DOB</label>
        <input
          type="date"
          class="form-control"
          id="dob"
          placeholder=""
          required
        />
        <div id="dobmsg" class="text-danger mt-2"></div>
      </div>
      <div class="mb-3">
        <label for="phno" class="form-label">Contact</label>
        <input
          type="tel"
          class="form-control"
          id="phno"
          placeholder=""
          required
        />
        <div id="contactmsg" class="text-danger mt-2"></div>
      </div>
      <button class="btn btn-primary" id="signIn">Sign in</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://code.jquery.com/jquery-4.0.0.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="register.js"></script>
  </body>
</html>
