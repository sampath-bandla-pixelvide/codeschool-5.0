<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://code.jquery.com/jquery-4.0.0.js"
      integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
      crossorigin="anonymous"
    ></script>
 
  </style>
   
  </head>
  <body class="vh-100 d-flex align-items-center" style="background-image: url(./images/backgroundimage.png); background-size:cover; background-repeat: none;"  >
    <div
      class="container d-flex flex-column align-items-center justify-content-center  bg-white h-50 w-25 bg-opacity-50 rounded"
      
    >
      <div class="form-floating mb-3 w-75">
        <input
          type="text"
          class="form-control"
          id="userName"
          placeholder="name@example.com"
        />
        <label for="floatingInput">UserName</label>
      </div>
      <div class="form-floating w-75 mb-3">
        <input
          type="password"
          class="form-control"
          id="password"
          placeholder="Password"
        />
        <label for="floatingPassword">Password</label>
      </div>
      <p id="apiError"></p>
      <button class="btn btn-primary px-5" type="submit" id="loginBtn">Login</button>
    </div>
  </body>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"
  ></script>
  <script src="./scripts/login.js"></script>
  <script src="./scripts/authorization.js"></script>
</html>
