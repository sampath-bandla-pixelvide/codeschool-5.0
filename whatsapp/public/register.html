<div class="vh-100 auth-wrapper d-flex align-items-center justify-content-center">
  <div class="card p-4 shadow-sm auth-card">

    <div class="text-center mb-3">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="50">
    </div>

    <h5 class="text-center fw-semibold">Create your account</h5>
    <p class="text-center text-muted small mb-4">
      Sign up to get started with WhatsApp
    </p>

    <div class="mb-1">
    <div class="input-group">
        
      <span class="input-group-text bg-white"><i class="bi bi-person"></i></span>
      <input id="username" class="form-control" placeholder="Username">
       
       
    </div>
    <p id="usernameMessage" class="m-0 text-center small"></p>
    </div>

   

    <div class="input-group mb-3">
      <span class="input-group-text bg-white">+91</span>
      <input id="phone" class="form-control" placeholder="Phone number">
    </div>

    <div class="input-group mb-3">
      <span class="input-group-text bg-white"><i class="bi bi-envelope"></i></span>
      <input id="email" class="form-control" placeholder="Email">
    </div>

    <div class="input-group mb-3">
      <span class="input-group-text bg-white"><i class="bi bi-lock"></i></span>
      <input id="password" type="password" class="form-control" placeholder="Password">
      <span id="togglePassword" class="input-group-text bg-white" style="cursor:pointer;">
        <i class="bi bi-eye"></i>
      </span>
    </div>

    <button id="registerBtn" class="btn btn-success w-100">Register</button>

    <p id="message" class="text-center small"></p>

    <p class="text-center mt-3 small">
      Already have an account?
      <a href="#" id="goLogin">Login</a>
    </p>

  </div>
</div>
