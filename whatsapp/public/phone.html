<div class="vh-100 auth-wrapper d-flex align-items-center justify-content-center">
  <div class="card p-4 shadow-sm auth-card">

    <!-- Logo -->
    <div class="text-center mb-3">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="50">
    </div>

    <!-- Title -->
    <h5 class="text-center fw-semibold">Enter your phone</h5>
    <p class="text-center text-muted small mb-4">
      We’ll send you a verification code
    </p>

    <!-- Phone -->
    <div class="input-group mb-3">
      <span class="input-group-text bg-white">+91</span>
      <input id="phoneInput" class="form-control" placeholder="Phone number">
    </div>

    <!-- Button -->
    <button id="sendOtpBtn" class="btn btn-success w-100">Send OTP</button>

    <!-- Message -->
    <p id="phoneMessage" class="text-center mt-3 small"></p>

    <!-- Back -->
    <p class="text-center small">
      <a href="#" id="backToLogin">Back to Login</a>
    </p>

  </div>
</div>
