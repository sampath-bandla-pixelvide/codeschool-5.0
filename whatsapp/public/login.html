<div class="vh-100 auth-wrapper d-flex align-items-center justify-content-center">
  <div class="card p-4 shadow-sm auth-card">

    <div class="text-center mb-3">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="50">
    </div>

    <h5 class="text-center fw-semibold">Welcome back</h5>
    <p class="text-center text-muted small mb-4">
      Login to continue to WhatsApp
    </p>

    <div class="input-group mb-3">
      <span class="input-group-text bg-white"><i class="bi bi-envelope"></i></span>
      <input id="loginEmail" class="form-control" placeholder="Email">
    </div>

    <div class="input-group mb-3">
      <span class="input-group-text bg-white"><i class="bi bi-lock"></i></span>
      <input id="loginPassword" type="password" class="form-control" placeholder="Password">
      <span id="loginTogglePassword" class="input-group-text bg-white" style="cursor:pointer;">
        <i class="bi bi-eye"></i>
      </span>
    </div>

    <button id="loginBtn" class="btn btn-success w-100">Login</button>

    <p class="text-center mt-3 small">
      <a href="#" id="goPhoneLogin">Try another way</a>
    </p>

    <div id="loginMessage" class="text-center small"></div>

    <p class="text-center mt-2 small">
      Don’t have an account?
      <a href="#" id="goRegister">Register</a>
    </p>

  </div>
</div>
